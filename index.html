<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="משחקי חומרים">
    <title>בחר משחק</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
        html, body {
            width:100%; height:100%; overflow:hidden;
            font-family: -apple-system, 'Heebo', Arial, sans-serif;
            background: linear-gradient(160deg, #4776E6 0%, #8E54E9 100%);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding: 28px 20px;
            gap: 14px;
        }
        .hub-icon  { font-size: clamp(56px, 12vw, 80px); line-height:1; }
        .hub-title {
            font-size: clamp(1.9rem, 5vw, 3rem);
            font-weight: 900; color:#fff; text-align:center;
            text-shadow: 0 3px 14px rgba(0,0,0,0.28);
        }
        .hub-sub {
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            color: rgba(255,255,255,0.82); text-align:center;
            margin-bottom: 8px;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
            width: 100%; max-width: 580px;
        }
        .game-card {
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.28);
            border-radius: 26px;
            padding: 28px 22px 24px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            display: flex; flex-direction:column; align-items:center; gap:10px;
            transition: transform 0.15s, background 0.15s;
            touch-action: manipulation;
        }
        .game-card:active { transform: scale(0.95); background: rgba(255,255,255,0.24); }
        .card-icon  { font-size: clamp(48px, 10vw, 64px); line-height:1; }
        .card-title { font-size: clamp(1.15rem, 3vw, 1.4rem); font-weight:900; color:#fff; }
        .card-desc  { font-size: clamp(0.82rem, 2vw, 0.95rem); color:rgba(255,255,255,0.82); line-height:1.55; }
        .card-badge {
            background: #FF6584; color:#fff;
            font-size: 0.78rem; font-weight:800;
            padding: 3px 12px; border-radius:20px;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="hub-icon">&#127918;</div>
    <h1 class="hub-title">משחקי חומרים</h1>
    <p class="hub-sub">בחר משחק להתחלה</p>
    <div class="games-grid">
        <a class="game-card" href="catch.html">
            <div class="card-icon">&#129521;</div>
            <div class="card-title">תפוס את החומר</div>
            <div class="card-desc">זהה מאיזה חומר עשוי כל חפץ והגע ל-50 נקודות!</div>
        </a>
        <a class="game-card" href="kpop.html">
            <div class="card-icon">&#128131;</div>
            <div class="card-title">סופר קייפופ</div>
            <div class="card-desc">עזרי למינה וחברותיה להביס את השדים!</div>
            <div class="card-badge">חדש!</div>
        </a>
    </div>
</body>
</html>

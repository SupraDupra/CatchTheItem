<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="תפוס את החומר">
    <title>תפוס את החומר</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
            touch-action: manipulation;
        }
        html, body { width:100%; height:100%; overflow:hidden; }
        body {
            font-family: -apple-system, 'Heebo', Arial, sans-serif;
            background: linear-gradient(160deg, #4776E6 0%, #8E54E9 100%);
            display:flex; align-items:center; justify-content:center;
        }

        /* ---- SCREENS ---- */
        .screen {
            display: none; position:absolute; inset:0;
            flex-direction:column; align-items:center; justify-content:center;
            padding: 24px 20px; gap:16px;
        }
        .screen.active { display:flex; }

        /* ---- WELCOME ---- */
        .welcome-icon { font-size:80px; line-height:1; margin-bottom:-4px; }
        .welcome-title {
            font-size: clamp(2rem,6vw,3rem); font-weight:900; color:#fff;
            text-align:center; text-shadow:0 3px 12px rgba(0,0,0,0.25);
        }
        .welcome-desc {
            font-size: clamp(0.95rem,2.5vw,1.15rem); color:rgba(255,255,255,0.88);
            text-align:center; line-height:1.7; max-width:400px;
        }
        .welcome-desc strong { color:#fff; font-weight:700; }
        .btn-group { display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:8px; width:100%; }

        /* ---- BUTTONS ---- */
        .btn {
            border:none; border-radius:18px;
            font-size: clamp(1.1rem,3vw,1.35rem); font-weight:800;
            cursor:pointer; padding:16px 32px; width:100%; max-width:320px;
            transition:transform 0.12s, box-shadow 0.12s; font-family:inherit;
        }
        .btn:active { transform:scale(0.94); }
        .btn-white  { background:#fff; color:#6C4EE8; box-shadow:0 8px 28px rgba(0,0,0,0.22); }
        .btn-ghost  { background:rgba(255,255,255,0.18); color:#fff; border:2px solid rgba(255,255,255,0.45); }
        .btn-check  {
            background:linear-gradient(135deg,#FF6584 0%,#FF4757 100%);
            color:#fff; box-shadow:0 8px 24px rgba(255,71,87,0.45);
            font-size:clamp(1.15rem,3vw,1.4rem);
            opacity:0; pointer-events:none;
            transition:opacity 0.3s,transform 0.12s,box-shadow 0.12s;
        }
        .btn-check.active { opacity:1; pointer-events:all; }

        /* ---- GAME HEADER ---- */
        .game-header {
            display:flex; justify-content:space-between; align-items:center;
            width:100%; max-width:560px; gap:8px;
        }
        .stat-pill {
            background:rgba(255,255,255,0.2); border-radius:30px;
            padding:8px 18px; color:#fff; font-weight:800;
            font-size:clamp(0.9rem,2.5vw,1.1rem); flex:1; text-align:center; white-space:nowrap;
        }

        /* Progress bar */
        .progress-wrap { width:100%; max-width:560px; height:10px; background:rgba(255,255,255,0.2); border-radius:5px; overflow:hidden; }
        .progress-fill { height:100%; background:#fff; border-radius:5px; transition:width 0.5s ease; }

        /* Instruction */
        .instruction {
            font-size:clamp(0.95rem,2.5vw,1.1rem); color:rgba(255,255,255,0.9);
            font-weight:600; text-align:center; min-height:1.6em;
        }

        /* ---- ITEM ---- */
        .item-area {
            display:flex; align-items:center; justify-content:center;
            width:100%; max-width:560px;
        }
        .item-card {
            width:clamp(130px,28vw,190px); height:clamp(130px,28vw,190px);
            border-radius:28px; background:#fff;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            cursor:pointer; box-shadow:0 12px 40px rgba(0,0,0,0.22);
            transition:background 0.5s,box-shadow 0.3s;
            position:relative; overflow:hidden; flex-shrink:0;
        }
        .item-emoji { font-size:clamp(54px,12vw,80px); line-height:1; }
        .item-label { font-size:clamp(0.85rem,2.5vw,1.05rem); font-weight:700; margin-top:6px; color:#333; transition:color 0.4s; }
        .item-card.tap-bounce { animation:tapBounce 0.28s ease; }
        @keyframes tapBounce {
            0%   { transform:scale(1); }
            40%  { transform:scale(0.88); }
            100% { transform:scale(1); }
        }
        .item-card::before {
            content:''; position:absolute; inset:0; opacity:0;
            transition:opacity 0.6s; pointer-events:none;
        }
        .item-card.textured::before { opacity:0.35; }

        /* ---- TAP DOTS ---- */
        .tap-dots { display:flex; gap:10px; align-items:center; }
        .dot {
            width:clamp(12px,2.5vw,16px); height:clamp(12px,2.5vw,16px);
            border-radius:50%; background:rgba(255,255,255,0.3);
            border:2px solid rgba(255,255,255,0.65);
            transition:background 0.25s,transform 0.25s;
        }
        .dot.filled { background:#fff; transform:scale(1.25); }

        /* ---- CUBES ROW ---- */
        .cubes-row {
            display:flex; gap:clamp(8px,2vw,16px);
            width:100%; max-width:560px; justify-content:center;
        }

        /* ---- CUBES ---- */
        .cube {
            flex:1; max-width:clamp(95px,18vw,130px); min-width:80px;
            height:clamp(75px,15vw,100px); border-radius:20px; background:#fff;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.16);
            border:3px solid transparent;
            transition:border-color 0.2s,background 0.2s,transform 0.15s,box-shadow 0.2s;
            opacity:0; transform:translateY(40px) scale(0.9); pointer-events:none;
        }
        .cube.visible { animation:cubeIn 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards; pointer-events:all; }
        @keyframes cubeIn {
            from { opacity:0; transform:translateY(40px) scale(0.9); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }
        .cube-swatch { width:28px; height:28px; border-radius:8px; margin-bottom:6px; border:2px solid rgba(0,0,0,0.08); }
        .cube-text   { font-size:clamp(0.95rem,2.5vw,1.2rem); font-weight:800; color:#222; text-align:center; }
        .cube:active   { transform:scale(0.94); }
        .cube.selected { border-color:#6C4EE8; background:#F3F0FF; box-shadow:0 6px 20px rgba(108,78,232,0.35); }
        .cube.correct  { border-color:#4CAF50; background:#E8F5E9; }
        .cube.wrong    { border-color:#FF5252; background:#FFEBEE; animation:shake 0.4s; }
        @keyframes shake {
            0%,100% { transform:translateX(0); }
            20% { transform:translateX(-8px); }
            40% { transform:translateX(8px); }
            60% { transform:translateX(-6px); }
            80% { transform:translateX(6px); }
        }

        /* ---- FEEDBACK FLASH ---- */
        .feedback-overlay {
            position:fixed; inset:0; display:flex; flex-direction:column;
            align-items:center; justify-content:center; z-index:200;
            pointer-events:none; opacity:0; animation:flashAnim 0.85s forwards;
        }
        .feedback-overlay.correct-flash { background:rgba(56,176,90,0.88); }
        .feedback-overlay.wrong-flash   { background:rgba(255,70,70,0.85); }
        @keyframes flashAnim {
            0%  { opacity:0; transform:scale(0.85); }
            25% { opacity:1; transform:scale(1); }
            75% { opacity:1; }
            100%{ opacity:0; }
        }
        .feedback-icon { font-size:clamp(70px,15vw,100px); }
        .feedback-text { font-size:clamp(1.4rem,4vw,2rem); font-weight:900; color:#fff; margin-top:10px; text-shadow:0 2px 8px rgba(0,0,0,0.2); }

        /* ---- WIN SCREEN ---- */
        .win-icon  { font-size:80px; }
        .win-title { font-size:clamp(1.8rem,5vw,2.6rem); font-weight:900; color:#fff; text-align:center; }
        .win-card  { background:rgba(255,255,255,0.16); border-radius:22px; padding:20px 28px; width:100%; max-width:340px; }
        .win-row   { display:flex; justify-content:space-between; align-items:center; color:#fff; font-size:clamp(1rem,2.8vw,1.15rem); padding:6px 0; }
        .win-row + .win-row { border-top:1px solid rgba(255,255,255,0.15); }
        .win-row strong { font-weight:800; font-size:1.1em; }
        .name-input {
            width:100%; max-width:320px; padding:15px 18px;
            border-radius:16px; border:none; font-size:clamp(1rem,2.8vw,1.15rem);
            text-align:center; outline:none; font-family:inherit;
            font-weight:600; color:#333; box-shadow:0 4px 16px rgba(0,0,0,0.15);
        }
        .name-input::placeholder { color:#aaa; }

        /* ---- LEADERBOARD ---- */
        .lb-title { font-size:clamp(1.5rem,4vw,2rem); font-weight:900; color:#fff; }
        .lb-wrap  { width:100%; max-width:520px; background:rgba(255,255,255,0.1); border-radius:20px; overflow:hidden; }
        .lb-row   {
            display:grid; grid-template-columns:44px 1fr 80px 65px;
            align-items:center; padding:12px 16px; color:#fff;
            font-size:clamp(0.9rem,2.5vw,1rem);
            border-bottom:1px solid rgba(255,255,255,0.08); gap:4px;
        }
        .lb-row:last-child { border-bottom:none; }
        .lb-header { font-weight:800; background:rgba(255,255,255,0.18); font-size:0.9em; }
        .lb-row.gold   { background:rgba(255,215,0,0.18); }
        .lb-row.silver { background:rgba(200,200,200,0.12); }
        .lb-row.bronze { background:rgba(205,127,50,0.12); }
        .lb-empty { color:rgba(255,255,255,0.7); text-align:center; padding:28px; font-size:1rem; }
    </style>
</head>
<body>

<!-- WELCOME -->
<div class="screen active" id="welcomeScreen">
    <div class="welcome-icon">&#129521;</div>
    <h1 class="welcome-title">תפוס את החומר!</h1>
    <p class="welcome-desc">
        לחץ על החפץ <strong>3 פעמים</strong> כדי לגלות ממה הוא עשוי.<br>
        בחר את המרקם הנכון מבין שלוש הקוביות ולחץ <strong>בדוק</strong>.<br>
        הגע ל-<strong>50 נקודות</strong> כדי לנצח!
    </p>
    <div class="btn-group">
        <button class="btn btn-white" onclick="startGame()">&#9654; התחל משחק</button>
        <button class="btn btn-ghost" onclick="showLeaderboard()">&#127942; לוח תוצאות</button>
        <button class="btn btn-ghost" onclick="window.location.href='index.html'">&#127968; תפריט ראשי</button>
    </div>
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">
    <div class="game-header">
        <div class="stat-pill">&#11088; <span id="scoreVal">0</span>/50</div>
        <div class="stat-pill">&#9201; <span id="timerVal">0:00</span></div>
        <div class="stat-pill">&#10060; <span id="errorsVal">0</span></div>
    </div>
    <div class="progress-wrap">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <p class="instruction" id="instruction">לחץ על החפץ 3 פעמים</p>
    <div class="item-area">
        <div class="item-card" id="itemCard" onclick="handleItemTap()">
            <div class="item-emoji" id="itemEmoji"></div>
            <div class="item-label" id="itemLabel"></div>
        </div>
    </div>
    <div class="cubes-row">
        <div class="cube" id="cubeA" onclick="selectCube('A')">
            <div class="cube-swatch" id="cubeAColor"></div>
            <div class="cube-text"  id="cubeAText"></div>
        </div>
        <div class="cube" id="cubeB" onclick="selectCube('B')">
            <div class="cube-swatch" id="cubeBColor"></div>
            <div class="cube-text"  id="cubeBText"></div>
        </div>
        <div class="cube" id="cubeC" onclick="selectCube('C')">
            <div class="cube-swatch" id="cubeCColor"></div>
            <div class="cube-text"  id="cubeCText"></div>
        </div>
    </div>
    <div class="tap-dots">
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
    </div>
    <button class="btn btn-check" id="checkBtn" onclick="checkAnswer()">&#10003; בדוק</button>
</div>

<!-- WIN -->
<div class="screen" id="winScreen">
    <div class="win-icon">&#127942;</div>
    <h2 class="win-title">כל הכבוד! ניצחת!</h2>
    <div class="win-card">
        <div class="win-row"><span>&#9201; זמן</span><strong id="finalTime"></strong></div>
        <div class="win-row"><span>&#10060; טעויות</span><strong id="finalErrors"></strong></div>
    </div>
    <input type="text" class="name-input" id="playerName" placeholder="הכנס את שמך..." maxlength="20" />
    <div class="btn-group">
        <button class="btn btn-white" onclick="saveScore()">&#128190; שמור תוצאה</button>
        <button class="btn btn-ghost" onclick="startGame()">&#8635; שחק שוב</button>
        <button class="btn btn-ghost" onclick="window.location.href='index.html'">&#127968; תפריט ראשי</button>
    </div>
</div>

<!-- LEADERBOARD -->
<div class="screen" id="leaderboardScreen">
    <div style="font-size:60px">&#127942;</div>
    <h2 class="lb-title">לוח התוצאות</h2>
    <div class="lb-wrap" id="lbWrap"></div>
    <div class="btn-group" style="margin-top:4px">
        <button class="btn btn-white" onclick="window.location.href='index.html'">&#127968; תפריט ראשי</button>
        <button class="btn btn-ghost" onclick="showScreen('welcomeScreen')">&#9654; שחק</button>
    </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────

const ITEMS = [
    { emoji:'🕯️',  name:'נר',       texture:'שעווה',  color:'#F5E3A0' },
    { emoji:'🪑',  name:'כיסא',     texture:'עץ',     color:'#A0672A' },
    { emoji:'⚽',  name:'כדור',     texture:'גומי',   color:'#3A3A3A' },
    { emoji:'🪟',  name:'חלון',     texture:'זכוכית', color:'#A8D8F0' },
    { emoji:'🎈',  name:'בלון',     texture:'לטקס',   color:'#FF7070' },
    { emoji:'📄',  name:'דף',       texture:'נייר',   color:'#F0EDD4' },
    { emoji:'🍳',  name:'מחבת',     texture:'ברזל',   color:'#8A8A8A' },
    { emoji:'🧥',  name:'מעיל',     texture:'צמר',    color:'#C49080' },
    { emoji:'🧱',  name:'קיר',      texture:'לבנים',  color:'#C0603A' },
    { emoji:'👟',  name:'נעל',      texture:'עור',    color:'#9A5020' },
    { emoji:'🪨',  name:'סלע',      texture:'אבן',    color:'#787878' },
    { emoji:'🧊',  name:'קרח',      texture:'קרח',    color:'#90D0F0' },
    { emoji:'🌿',  name:'עלה',      texture:'בד',     color:'#5A9A50' },
    { emoji:'🕶️',  name:'משקפיים', texture:'פלסטיק', color:'#2A2A60' },
];

// ── STATE ─────────────────────────────────────────────────────────────────────

let score=0, errors=0, startTime=0, timerInterval=null;
let tapCount=0, textureRevealed=false, answering=false;
let currentItem=null, shuffledItems=[], itemIndex=0;
let selectedCube=null, correctCube=null;
let finalSeconds=0;

// ── UTILS ─────────────────────────────────────────────────────────────────────

function shuffle(arr) {
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
}
function fmtTime(s){ return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
function vibrate(ms){ if(navigator.vibrate) navigator.vibrate(ms); }

// ── SCREEN MANAGEMENT ────────────────────────────────────────────────────────

function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ── GAME START ────────────────────────────────────────────────────────────────

function startGame(){
    score=0; errors=0; itemIndex=0;
    startTime=Date.now();
    shuffledItems=shuffle(ITEMS);
    if(timerInterval) clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
        const s=Math.floor((Date.now()-startTime)/1000);
        document.getElementById('timerVal').textContent=fmtTime(s);
    },500);
    showScreen('gameScreen');
    loadItem();
}

// ── LOAD ITEM ────────────────────────────────────────────────────────────────

function loadItem(){
    tapCount=0; textureRevealed=false; answering=false; selectedCube=null;
    currentItem=shuffledItems[itemIndex%shuffledItems.length];

    const card=document.getElementById('itemCard');
    card.style.background='#fff';
    card.style.boxShadow='0 12px 40px rgba(0,0,0,0.22)';
    card.classList.remove('textured');

    document.getElementById('itemEmoji').textContent=currentItem.emoji;
    document.getElementById('itemLabel').textContent=currentItem.name;
    document.getElementById('itemLabel').style.color='#333';

    ['d1','d2','d3'].forEach(id=>document.getElementById(id).classList.remove('filled'));
    ['A','B','C'].forEach(id=>{ document.getElementById('cube'+id).className='cube'; });
    document.getElementById('checkBtn').classList.remove('active');
    document.getElementById('instruction').textContent='לחץ על החפץ 3 פעמים';

    document.getElementById('scoreVal').textContent=score;
    document.getElementById('errorsVal').textContent=errors;
    document.getElementById('progressFill').style.width=(score*2)+'%';
}

// ── TAP ──────────────────────────────────────────────────────────────────────

function handleItemTap(){
    if(textureRevealed||answering) return;
    tapCount++;
    vibrate(20);
    const card=document.getElementById('itemCard');
    card.classList.remove('tap-bounce');
    void card.offsetWidth;
    card.classList.add('tap-bounce');
    if(tapCount>=1) document.getElementById('d1').classList.add('filled');
    if(tapCount>=2) document.getElementById('d2').classList.add('filled');
    if(tapCount>=3){ document.getElementById('d3').classList.add('filled'); setTimeout(revealTexture,320); }
}

// ── REVEAL TEXTURE ───────────────────────────────────────────────────────────

function revealTexture(){
    textureRevealed=true;
    const item=currentItem;
    const card=document.getElementById('itemCard');
    card.style.background=item.color;
    card.style.boxShadow='0 12px 40px rgba(0,0,0,0.3)';
    card.classList.add('textured');
    document.getElementById('itemLabel').textContent=item.texture;
    document.getElementById('itemLabel').style.color='rgba(255,255,255,0.95)';
    document.getElementById('instruction').textContent='בחר את המרקם הנכון';

    const wrongItems=shuffle(ITEMS.filter(i=>i.texture!==item.texture)).slice(0,2);
    const positions=shuffle(['A','B','C']);
    correctCube=positions[0];
    const cubeItems={[positions[0]]:item,[positions[1]]:wrongItems[0],[positions[2]]:wrongItems[1]};

    ['A','B','C'].forEach(id=>{
        document.getElementById('cube'+id+'Text').textContent=cubeItems[id].texture;
        document.getElementById('cube'+id+'Color').style.background=cubeItems[id].color;
    });
    setTimeout(()=>{ document.getElementById('cubeA').className='cube visible'; },80);
    setTimeout(()=>{ document.getElementById('cubeB').className='cube visible'; },180);
    setTimeout(()=>{ document.getElementById('cubeC').className='cube visible'; },280);
}

// ── SELECT CUBE ──────────────────────────────────────────────────────────────

function selectCube(which){
    if(!textureRevealed||answering) return;
    selectedCube=which;
    vibrate(15);
    ['A','B','C'].forEach(id=>{ document.getElementById('cube'+id).classList.toggle('selected',id===which); });
    document.getElementById('checkBtn').classList.add('active');
}

// ── CHECK ─────────────────────────────────────────────────────────────────────

function checkAnswer(){
    if(!selectedCube||answering) return;
    answering=true;
    vibrate(30);
    const correct=selectedCube===correctCube;
    document.getElementById('cube'+correctCube).classList.add('correct');
    if(!correct){
        ['A','B','C'].filter(id=>id!==correctCube).forEach(id=>{
            document.getElementById('cube'+id).classList.add('wrong');
        });
    }
    showFeedback(correct);
    if(correct){ score++; } else { errors++; score=Math.max(0,score-1); }
    setTimeout(()=>{
        if(score>=50){ endGame(); } else { itemIndex++; loadItem(); }
    },950);
}

// ── FEEDBACK FLASH ────────────────────────────────────────────────────────────

function showFeedback(correct){
    const div=document.createElement('div');
    div.className='feedback-overlay '+(correct?'correct-flash':'wrong-flash');
    div.innerHTML=`<div class="feedback-icon">${correct?'&#9989;':'&#10060;'}</div>
        <div class="feedback-text">${correct?'כל הכבוד!':'טעות!'}</div>`;
    document.body.appendChild(div);
    setTimeout(()=>div.remove(),900);
}

// ── END GAME ──────────────────────────────────────────────────────────────────

function endGame(){
    if(timerInterval) clearInterval(timerInterval);
    finalSeconds=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('finalTime').textContent=fmtTime(finalSeconds);
    document.getElementById('finalErrors').textContent=errors;
    document.getElementById('playerName').value='';
    showScreen('winScreen');
}

// ── SAVE SCORE ────────────────────────────────────────────────────────────────

function saveScore(){
    const name=document.getElementById('playerName').value.trim()||'שחקן אנונימי';
    const scores=JSON.parse(localStorage.getItem('catchItemScores')||'[]');
    scores.push({name,time:finalSeconds,errors,date:new Date().toLocaleDateString('he-IL')});
    scores.sort((a,b)=>a.time-b.time||a.errors-b.errors);
    scores.splice(10);
    localStorage.setItem('catchItemScores',JSON.stringify(scores));
    showLeaderboard();
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────

function showLeaderboard(){
    const scores=JSON.parse(localStorage.getItem('catchItemScores')||'[]');
    const wrap=document.getElementById('lbWrap');
    if(scores.length===0){
        wrap.innerHTML='<div class="lb-empty">עדיין אין תוצאות.<br>היה הראשון לנצח!</div>';
    } else {
        const medals=['&#129351;','&#129352;','&#129353;'];
        const rowClasses=['gold','silver','bronze'];
        let html=`<div class="lb-row lb-header"><div>#</div><div>שם</div><div>זמן</div><div>טעויות</div></div>`;
        scores.forEach((s,i)=>{
            html+=`<div class="lb-row ${rowClasses[i]||''}">
                <div>${medals[i]||(i+1)}</div>
                <div>${s.name}</div>
                <div>${fmtTime(s.time)}</div>
                <div>${s.errors}</div>
            </div>`;
        });
        wrap.innerHTML=html;
    }
    showScreen('leaderboardScreen');
}
</script>
</body>
</html>
